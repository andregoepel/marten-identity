name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Restore tools
        run: dotnet tool restore

      - name: Format check
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

  pack-and-publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      id-token: write # request the OIDC token for NuGet trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack src/AndreGoepel.Marten.Identity.Abstractions/AndreGoepel.Marten.Identity.Abstractions.csproj \
            -c Release -p:Version=$VERSION -o nupkgs
          dotnet pack src/AndreGoepel.Marten.Identity/AndreGoepel.Marten.Identity.csproj \
            -c Release -p:Version=$VERSION -o nupkgs
          dotnet pack src/AndreGoepel.Marten.Identity.Blazor/AndreGoepel.Marten.Identity.Blazor.csproj \
            -c Release -p:Version=$VERSION -o nupkgs

      # Trusted publishing: exchange the GitHub OIDC token for a short-lived
      # nuget.org API key. Requires a trusted publishing policy on nuget.org
      # (owner: andregoepel, repository: marten-identity, workflow: ci.yml).
      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
