name: E2E

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Actions are pinned to commit SHAs (matching ci.yml) so a retagged or compromised
# action version cannot silently enter the pipeline.
jobs:
  end-to-end:
    runs-on: ubuntu-latest
    # GitHub-hosted Linux runners ship with Docker, which Aspire.Hosting.Testing uses to
    # start the Postgres container for the real end-to-end run.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Build E2E project
        run: dotnet build tests/AndreGoepel.Marten.Identity.E2ETests/AndreGoepel.Marten.Identity.E2ETests.csproj -c Release

      - name: Install Playwright browsers
        run: pwsh tests/AndreGoepel.Marten.Identity.E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests
        run: dotnet test tests/AndreGoepel.Marten.Identity.E2ETests/AndreGoepel.Marten.Identity.E2ETests.csproj --no-build -c Release
