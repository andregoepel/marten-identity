name: E2E

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Actions are pinned to commit SHAs (matching ci.yml) so a retagged or compromised
# action version cannot silently enter the pipeline.
jobs:
  end-to-end:
    runs-on: ubuntu-latest
    # GitHub-hosted Linux runners ship with Docker, which Aspire.Hosting.Testing uses to
    # start the Postgres container for the real end-to-end run.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Build E2E project
        run: dotnet build tests/AndreGoepel.Marten.Identity.E2ETests/AndreGoepel.Marten.Identity.E2ETests.csproj -c Release

      - name: Install Playwright browsers
        run: pwsh tests/AndreGoepel.Marten.Identity.E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests
        env:
          # Failed tests drop a Playwright trace here (see E2ETestBase); the next step
          # uploads it so a headless-runner failure can be replayed action by action.
          PLAYWRIGHT_TRACE_DIR: ${{ github.workspace }}/playwright-traces
        run: dotnet test tests/AndreGoepel.Marten.Identity.E2ETests/AndreGoepel.Marten.Identity.E2ETests.csproj --no-build -c Release

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces
          path: ${{ github.workspace }}/playwright-traces
          if-no-files-found: ignore
          retention-days: 14
